name: Deploy cloud-mail to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'mail-worker/**' # 确保路径匹配你的项目结构
      - 'mail-vue/**'
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境 (修复核心问题)
      # 将 node-version 设置为 LTS 版本 (如 18.x 或 20.x)，避免使用已弃用的旧运行器
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x' # 建议先尝试 18.x，兼容性最好
          cache: 'pnpm'        # 启用 pnpm 缓存加速

      # 3. 安装 pnpm (如果未自动识别)
      - name: Install pnpm
        run: npm install -g pnpm

      # 4. 安装依赖
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./mail-worker # 根据你的实际目录结构调整

      # 5. 构建项目 (可选，视 wrangler.toml 配置而定)
      - name: Build project
        run: pnpm build
        working-directory: ./mail-worker

      # 6. 部署到 Cloudflare
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: ./mail-worker
          # 如果有环境变量需要传递，可以在这里添加 secrets 映射
          secrets: |
            JWT_SECRET
            DATABASE_URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 7. 错误处理与调试 (新增)
      - name: Debug on failure
        if: failure()
        run: |
          echo "Deployment failed. Checking logs..."
          cat /home/runner/.wrangler/logs/wrangler.log || true
